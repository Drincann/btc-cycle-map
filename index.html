<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BTC 减半周期</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Bitcoin halving cycle</p>
          <h1>BTC 减半周期</h1>
        </div>
        <div class="scale-control controls" aria-label="坐标模式">
          <span class="control-label">坐标</span>
          <div class="seg-group">
            <button class="seg" data-scale="linear" type="button">线性</button>
            <button class="seg active" data-scale="log" type="button">对数</button>
            <button class="seg" data-scale="relative" type="button">比例</button>
          </div>
        </div>
      </header>

      <section class="chart-panel">
        <div class="chart-head">
          <div>
            <strong>走势图</strong>
            <span id="status">加载中</span>
          </div>
          <div id="legend" class="legend"></div>
        </div>
        <div class="chart-wrap">
          <canvas id="chart" aria-label="BTC 周期对比图"></canvas>
          <div id="tooltip" class="tooltip" hidden></div>
        </div>
      </section>

      <section class="stats">
        <h2>周期摘要</h2>
        <div id="cards" class="cards"></div>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
